  clean_all_good: "${e.check} ${target} — ок\n<i>тут всё чисто ✨</i>"

menu:
  unknown: "Меню не найдено"
  error: "Ошибка"
  access:
    only_admins: "🔒 Только для админов группы"
    only_initiator: "🔒 Жми команду сам"
    only_initiator_or_admin: "🔒 Только инициатор или админ группы"
    denied: "Доступ запрещён"
  saved: "✓ Сохранено"
  cancelled: "↩️ Отменено"
  session_expired: "⏱ Сессия истекла"
  start:
    private: |
      ${e.shield} Йо, <b>${name}</b>! ${e.wave}

      <b>LyAdminBot</b> — антиспам для групп.
      Ловлю спам · баню мошенников · чищу рекламу.

      <b>Быстрый старт:</b>
      1. Добавь в группу
      2. Дай права админа
      3. Готово — сам разберусь.
    group: |
      ${e.shield} Антиспам работает. <code>/help</code> — что умею.
    placeholder: "Эта функция скоро будет доступна. Попробуй <code>/settings</code> через минуту."
    btn:
      add: "➕ Добавить в группу"
      help: "📖 Помощь"
      lang: "🌐 Язык"
  help:
    title: "${e.shield} <b>LyAdminBot · Помощь</b>"
    only_initiator: "🔒 Нажми /help сам, чтобы открыть меню"
    tab_label:
      start: "🛡 Старт"
      mod: "⚔️ Модерация"
      stats: "📊 Стата"
      admin: "🔧 Админ"
      about: "💬 О боте"
    body:
      start: |
        Я ловлю спам в группах автоматом — добавь меня и сделай админом.

        <b>Быстрый старт:</b>
        1. Добавь в группу
        2. Дай права админа (удалять сообщения + банить)
        3. Напиши в группе <code>/ping</code>, чтобы проверить

        Основные команды:
        • <code>/help</code> — это меню
        • <code>/lang</code> — выбрать язык
        • <code>/ping</code> — живой ли бот
      mod: |
        Для админов, в ответ (${e.reply}) на сообщение:
        • <code>/banan</code> — мут. Ещё раз — размут
        • <code>/banan 5m</code> — мут на время (m/h/d)
        • <code>/kick</code> — выгнать из группы
        • <code>/del</code> — удалить сообщение
        • <code>/report</code> — жалоба на спам (может каждый)

        <i>${e.reply} — надо ответить на сообщение</i>
      stats: |
        Твоя статистика в чате:
        • <code>/mystats</code> — бананы, сообщения, актив (в личку)
        • <code>/top</code> — самые активные
        • <code>/top_banan</code> — топ коллекционеров бананов

        <i>Только для групп.</i>
      admin: |
        Для админов:
        • <code>/settings</code> — панель настроек чата
        • <code>!spam</code> — антиспам (alias, мигрирует)
        • <code>!welcome</code>, <code>!gif</code>, <code>!text</code> — приветствия
        • <code>!extra название</code> — сохранить быструю команду

        <b>Как дать мне права:</b>
        Зайди в настройки чата → Админы → Добавить → LyAdminBot, включи «Удалять сообщения» и «Банить пользователей».
      about: |
        <b>LyAdminBot</b> — антиспам-бот для Telegram-групп.

        Что умею:
        ${e.shield} ловлю спам (правила, сигнатуры, AI, голосование)
        ${e.banana} модерация: бан, кик, удаление
        ${e.wave} приветствия новым
        ${e.chart} статистика активности
        ${e.notes} extra-команды (<code>#rules</code>, <code>#faq</code>)

        Язык: українська, english, русский, türkçe, беларуская.
        <i>Без флагов — язык, а не политика.</i>
  onboarding:
    card: |
      ${e.shield} Привет! Я тут, антиспам активен.

      <b>Быстрая настройка (60 секунд):</b>

      🌐 Язык: <b>${language}</b> (auto)
      🎚 Чувствительность: <b>${threshold}%</b> (${sensitivityLabel})
      👋 Приветствие: <b>${welcomeState}</b>
    ack: "👌 Принято — работаю"
    config_soon: "Настройки скоро будут активны, попробуй /settings через минуту"
    sensitivity:
      low: "мягкая"
      mid: "средняя"
      high: "строгая"
    welcome:
      on: "включено"
      off: "выключено"
    btn:
      ack: "✓ Так подходит"
      config: "🔧 Настроить"

