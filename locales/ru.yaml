bot_added:
  as_admin: |
    ${e.shield} На страже! Антиспам работает.
    <code>!spam</code> — настройки
  need_admin: |
    ${e.wave} Привет! Чтобы чистить спам — дай права админа (удалять сообщения + банить).
    <code>/help</code> — что умею
  promoted: |
    ${e.shield} Теперь на страже. Спам не пройдёт.
  demoted: |
    😴 Без прав админа не смогу банить спамеров. Если что — верни права.

group:
  start: |
    ${e.shield} Антиспам-бот. Ловлю спам, баню мошенников.
    <code>!spam</code> — настройки (админы)
    <code>/help</code> — все команды

private:
  start: |
    Йо, <b>${name}</b>! ${e.wave}

    ${e.shield} <b>LyAdminBot</b> — антиспам для групп.
    Ловлю спам, баню мошенников, чищу рекламу.

    Добавь в группу → дай права админа → готово.
  btn_add: Добавить в группу
cmd:
  help: |
    ${e.shield} <b>Модерация</b>
    /banan — мут (${e.reply}). Ещё раз — размут
    /banan 5m — мут на время (m/h/d)
    /kick — выгнать (${e.reply})
    /del — удалить (${e.reply})
    /report — жалоба на спам (${e.reply})

    ${e.chart} <b>Стата</b>
    /mystats · /top · /top_banan

    ${e.gear} <b>Прочее</b>
    /lang — язык · /ping — статус
    /extras — сохранённые команды

    ${e.lock} <b>Для админов</b> <code>!</code>
    <code>!spam</code> — антиспам настройки
    <code>!trust</code> — доверенные юзеры (${e.reply})
    <code>!welcome</code> · <code>!gif</code> · <code>!text</code> — приветствия
    <code>!banbase</code> · <code>!banChannel</code> — баны

    <i>${e.reply} = в ответ</i>
  my_stats:
    send_pm: Стату скинул в личку ${e.chart}
    chat: |
      ${e.chart} Стата ${name} в <b>${chatName}</b>:

      ${e.banana} <b>Бананов:</b> ${banCount}
      ${e.clock} <b>Всего в бане:</b> ${banTime}
      ${e.zap} <b>Автобан:</b> ${banAutoTime}

      ${e.chat} <b>Сообщений:</b> ${messages}
      ${e.chart_up} <b>Актив:</b> ${active}%
      🌊 <b>Флуд:</b> ${flood}%

      ${e.calendar} <b>Тут с:</b> ${createdAt}
      ${badge}
    error:
      blocked: |
        Не могу написать тебе в личку 😅
        Напиши мне первым, и тогда попробуй снова.
    badge:
      exemplary: "\n🏅 <i>Образцовый гражданин</i>"
      collector: "\n${e.banana} <i>Коллекционер бананов</i>"
      soul: "\n${e.masks} <i>Душа компании</i>"
      flood_master: "\n🌊 <i>Мастер потока</i>"
      silent: "\n🤫 <i>Тихий наблюдатель</i>"
      veteran: "\n🎖 <i>Ветеран чата</i>"
      newbie: "\n🐣 <i>Новичок</i>"
  top:
    info: |
      ${e.trophy} Топ активных в <b>${chatName}</b>:
      ${top}
  top_banan:
    info: |
      ${e.banana} Топ по бананам в <b>${chatName}</b>:
      ${top}
    error:
      empty: Тут ещё никто не получал ${e.banana}
    titles:
      1: "${e.crown}"
      2: "🥈"
      3: "🥉"
    crown: "${e.crown} Банановый король"
    dominator: "${e.trophy} Доминатор мутов"
    veteran: "🎖 Ветеран тишины"
  extras:
    list: |
      ${e.notes} <b>Extra команды:</b>
      ${extras}
    error:
      not_found: |
        Пока нет extra команд.
        Админ может создать: <code>!extra название</code>
  ping:
      pong: |
        🏓 Pong!
        <b>Сервер:</b> ${sms} мс
        <b>Telegram:</b> ${tms} мс
        <b>Аптайм:</b> ${workTime}

        ${extra}
      delay: |
        ❗️ <b>Бот был офлайн:</b> ${delayTime}
      easter:
        fast: |
          ${e.zap} Молниеносный понг!
          <b>Сервер:</b> ${sms} мс
          <b>Telegram:</b> ${tms} мс
          <b>Аптайм:</b> ${workTime}

          ${extra}
        slow: |
          🐌 Понг... наконец-то
          <b>Сервер:</b> ${sms} мс
          <b>Telegram:</b> ${tms} мс
          <b>Аптайм:</b> ${workTime}

          ${extra}
  welcome:
    disable: Приветствия выключены ${e.wave}
    enable: Приветствия включены ${e.wave}
  gif:
    push: Gif добавлен ✓
    pull: Gif удалён ✓
    reset: Все gif очищены ✓
  text:
    push: Текст добавлен ✓
    pull: Текст удалён ✓
    error: Текст должен содержать <code>%name%</code>
    reset: Все тексты очищены ✓
  extra:
    push: \#${extraName} сохранено ✓
    pull: \#${extraName} удалено ✓
    max: Максимум extra в сообщении — <b>${maxExtra}</b>
    error:
      not_found: |
        \#${extraName} не найдено.
        Чтобы создать — напиши команду в ответ на сообщение.
    set:
  members:
    member: |
      <a href="tg://user?id=${telegram_id}">${telegram_id}</a>
      ${banTime} | a: ${active} | f: ${flood}
  quote: |
    Для цитат юзай @QuotLyBot
  banDatabase:
    disable: Глобальная бан-база выключена
    enable: Глобальная бан-база включена
  banChannel:
    disable: Бан каналов выключен
    enable: Бан каналов включен
  spam_settings:
    enabled: "${e.check} <b>Антиспам включен</b>"
    disabled: "${e.cross} <b>Антиспам выключен</b>"
    allow:
      added: "${e.check} Разрешено: \"${rule}\""
      error: "${e.cross} Укажи текст правила\n\n<b>Пример:</b> <code>!spam allow продажа курсовых</code>"
    deny:
      added: "${e.check} Запрещено: \"${rule}\""
      error: "${e.cross} Укажи текст правила\n\n<b>Пример:</b> <code>!spam deny реклама заработка</code>"
    remove:
      success: "${e.check} Правило удалено: \"${rule}\""
      error: "${e.cross} Неверный номер правила\n\nГлянь список: <code>!spam</code>"
    clear: "${e.check} Правила очищены (было: ${count})"
    globalban:
      enabled: "${e.check} <b>Глобальный бан включен</b>\nСпамеры из других групп тоже будут забанены тут"
      disabled: "${e.cross} <b>Глобальный бан выключен</b>\nБаны действуют только в этой группе"
      error: "Юзай <code>!spam globalban on</code> или <code>!spam globalban off</code>"
    threshold:
      set: "${e.check} <b>Чувствительность:</b> ${value}%\n\nВыше = меньше ошибок, но может что-то пропустить"
      error: "${e.cross} От 50 до 95\n\n<code>!spam threshold 75</code>"
    status:
      title: "${e.shield} <b>Настройки антиспама</b>"
      enabled_text: "${e.check} Включено"
      disabled_text: "${e.cross} Выключено"
      globalban_enabled: "${e.check} Да"
      globalban_disabled: "${e.cross} Нет"
      rules_title: "Правила (${count}):"
      rules_empty: "Не настроено"
      rule_allow: "${e.check} Разрешить"
      rule_deny: "${e.cross} Запретить"
      commands_title: "Команды:"
      trusted_users: "юзеров"
      commands: |
        <code>!spam on</code> — включить
        <code>!spam off</code> — выключить
        <code>!spam globalban on/off</code> — глобальный бан
        <code>!spam threshold 50-95</code> — порог уверенности
        <code>!spam trust</code> — доверять (в ответ)
        <code>!spam untrust</code> — не доверять (в ответ)
        <code>!spam allow текст</code> — разрешить
        <code>!spam deny текст</code> — запретить
        <code>!spam remove N</code> — удалить правило
        <code>!spam clear</code> — очистить всё
    trust:
      usage: "<b>Как юзать:</b>\n• В ответ: <code>!spam trust</code>\n• По юзернейму: <code>!spam trust @username</code>\n• По ID: <code>!spam trust 123456</code>"
      cant_trust_bot: "${e.robot} Ботов нельзя"
      already_trusted: "${e.check} ${name} уже в доверенных"
      added: "${e.check} ${name} теперь в доверенных"
      user_not_found: "${e.cross} Не нашёл ${username}"
    untrust:
      usage: "<b>Как юзать:</b>\n• В ответ: <code>!spam untrust</code>\n• По юзернейму: <code>!spam untrust @username</code>\n• По ID: <code>!spam untrust 123456</code>"
      not_trusted: "${e.cross} ${name} и так не в доверенных"
      removed: "${e.check} ${name} больше не в доверенных"
      user_not_found: "${e.cross} Не нашёл ${username}"
    btn:
      enable: "Включить"
      disable: "Выключить"
      globalban_on: "Глоб. бан: вкл"
      globalban_off: "Глоб. бан: выкл"
      rules: "Правила"
      trusted: "Доверенные"
      help: "Команды"
    cb:
      enabled: "Включено"
      disabled: "Выключено"
      globalban_on: "Глобальный бан включен"
      globalban_off: "Глобальный бан выключен"
      rules_title: "Правила"
      trusted_title: "Доверенные"
      no_rules: "Правил нет"
      no_trusted: "Доверенных нет"
      error: "Ошибка"
  reset: Настройки сброшены ✓
settings:
    json:
      reset: Настройки восстановлены из файла ✓
banan:
  show: ${name} показывает ${e.banana}
  suc:  ${name} получает ${e.banana}\n<b>На:</b> ${duration}
  pick: ${name} лишился ${e.banana}
  error: "${e.cross} Не могу замутить"
  error_admin: "${e.cross} Админов не мутят 😏"
  error_left: "${e.cross} Уже не в чате"
  error_no_rights: "${e.cross} Дай мне права банить"
  cant_ban_linked_channel: "${e.cross} Нельзя банить привязанный канал"
  # Easter eggs
  easter:
    nice: "${name} получает ${e.banana}\n<b>На:</b> ${duration}\n\n<i>nice</i>"
    blaze: "${name} получает ${e.banana}${e.fire}\n<b>На:</b> ${duration}\n\n<i>blaze it</i>"
    huge: "${name} получает БАНАНИЩЕ ${e.banana}${e.banana}${e.banana}\n<b>На:</b> ${duration}"
    self: "${name} показывает ${e.banana} сам себе\n<b>На:</b> ${duration}\n<i>уважаю решение</i>"
    self_again: "${name} снова показывает ${e.banana} сам себе\n<b>На:</b> ${duration}\n<i>это уже традиция?</i>"
    self_legend: "${name} показывает ${e.banana} сам себе\n<b>На:</b> ${duration}\n<i>легенда самомодерации</i>"
    first_after_many: "Исторический момент! ${name} получает первый ${e.banana}\n<b>На:</b> ${duration}"
    round_number: "${name} получает юбилейный ${e.banana} #${count}\n<b>На:</b> ${duration}"
    speed_ban: "${name} получает ${e.banana} спидран\n<b>На:</b> ${duration}\n<i>быстро же ты</i>"
    minute_exact: "${name} получает ${e.banana} ровно на минуту\n<i>точность — вежливость королей</i>"
kick:
  suc: ${name} вылетает из чата 👢
  who: Кого кикнуть? 🤔
  error: "${e.cross} Не могу кикнуть"
  error_admin: "${e.cross} Админов не кикают"
  error_left: "${e.cross} Уже не в чате"
  error_no_rights: "${e.cross} Дай мне права банить"
  easter:
    self: "${name} сам себя кикнул 👢\n<i>уважаю</i>"
    admin_self: "Админ ${name} сам себя кикнул 👢\n<i>вот это поворот</i>"
del:
  error: "${e.cross} Не могу удалить"
  error_no_rights: "${e.cross} Дай мне права удалять"
  error_old: "${e.cross} Слишком старое сообщение"
sticker:
  save:
    suc: Стикер добавлен в <a href="${link}">стикерпак группы</a> ✓
    error:
      animated: Анимированные не поддерживаются 😅
      telegram: "${e.cross} Не получилось сохранить"
  delete:
    suc: Стикер удалён из <a href="${link}">стикерпака</a> ✓
    error:
      telegram: "${e.cross} Не получилось удалить"
  empty_forward: "↩️ Ответь на стикер, фото или файл"
  only_admin: "${e.lock} Только админы. Свой пак — @fStikBot"
spam:
  notification:
    full: "${e.ban} ${name} — спам\n<code>${reason}</code>"
    muted_only: "${e.mute} ${name} замьючен\n<code>${reason}</code>\n\n${e.warn} Сообщение не удалось удалить"
    deleted_only: "${e.trash} Спам удалён\n<code>${reason}</code>\n\n${e.warn} ${name} не замьючен"
    no_permissions: "${e.eyes} Похоже на спам от ${name}\n<code>${reason}</code>\n\n${e.bulb} Дайте мне права админа — сам разберусь"
  btn_not_spam: "Не спам"
  admin_override: "${e.check} <b>Отменено ${admin}</b>\n\n${e.user} ${name} разблокирован"
  admin_override_not_admin: "Только для админов группы"

only_group: "${e.group} Работает только в группах"
only_admin: "${e.lock} Только для админов группы"

global_ban:
  kicked: "${e.ban} ${name} исключён — глобальный бан.\n<code>${reason}</code>"

spam_vote:
  # Easter eggs for vote results
  result_unanimous_spam: "${e.target} Единогласно — спам"
  result_unanimous_clean: "${e.target} Единогласно — не спам"
  result_close_call: "😬 На грани"
  result_landslide: "${e.trophy} Уверенная победа"
  result_fast: "${e.zap} Молниеносный вердикт"
  result_solo_hero: "🦸 Один голос решил всё"

report:
  only_group: "Только в группах"
  need_reply: "↩️ Ответь на сообщение"
  cant_report_bot: "${e.robot} Это бот"
  cant_report_self: "🙃 Сам на себя?"
  cant_report_admin: "👮 Это админ"
  invalid_target: "Кто это написал? 🤷"
  rate_limited: "⏳ Подожди ${seconds}с"
  spam_check_disabled: "Антиспам выключен. Админ может включить: <code>!spam on</code>"
  no_content: "А где текст? 🤷"
  analyzing: "${e.search} Проверяю..."
  spam_found: "${e.ban} <b>Спам</b> от ${target}\n<code>${reason}</code>\n\n${action}\n\n<i>${e.megaphone} ${reporter}</i>"
  suspicious: "🤔 <b>Подозрительно</b> — ${target}\n<code>${reason}</code>\n\n<i>${e.megaphone} ${reporter}</i>"
  clean: "${e.check} ${target} — ок"
  error: "Что-то пошло не так"
  clean_thanks: "${e.check} ${target} — ок\n<i>спасибо за бдительность! ${e.eyes}</i>"
  clean_false_alarm: "${e.check} ${target} — ок\n<i>ложная тревога ${e.megaphone}</i>"
  clean_all_good: "${e.check} ${target} — ок\n<i>тут всё чисто ✨</i>"

menu:
  unknown: "Меню не найдено"
  error: "Ошибка"
  access:
    only_admins: "🔒 Только для админов группы"
    only_initiator: "🔒 Жми команду сам"
    only_initiator_or_admin: "🔒 Только инициатор или админ группы"
