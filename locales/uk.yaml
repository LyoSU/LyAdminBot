    only_initiator: "🔒 Натисни /help сам, щоб відкрити меню"
    tab_label:
      start: "🛡 Старт"
      mod: "⚔️ Модерація"
      stats: "📊 Стата"
      admin: "🔧 Адмін"
      about: "💬 Про бота"
    body:
      start: |
        Я ловлю спам у групах автоматично — додай мене і зроби адміном.

        <b>Швидкий старт:</b>
        1. Додай у групу
        2. Дай права адміна (видаляти повідомлення + банити)
        3. Напиши в групі <code>/ping</code>, щоб перевірити

        Основні команди:
        • <code>/help</code> — це меню
        • <code>/lang</code> — вибрати мову
        • <code>/ping</code> — чи живий бот
      mod: |
        Для адмінів у відповідь (${e.reply}) на повідомлення:
        • <code>/banan</code> — мут. Ще раз — розмут
        • <code>/banan 5m</code> — мут на час (m/h/d)
        • <code>/kick</code> — вигнати з групи
        • <code>/del</code> — видалити повідомлення
        • <code>/report</code> — скарга на спам (може будь-хто)

        <i>${e.reply} — треба відповісти на повідомлення</i>
      stats: |
        Твоя статистика активності в чаті:
        • <code>/mystats</code> — банани, повідомлення, актив (в приват)
        • <code>/top</code> — топ найактивніших
        • <code>/top_banan</code> — топ колекціонерів бананів

        <i>Статистика тільки для груп.</i>
      admin: |
        Для адмінів:
        • <code>/settings</code> — панель налаштувань чату
        • <code>!spam</code> — антиспам (alias, поки мігрує)
        • <code>!welcome</code>, <code>!gif</code>, <code>!text</code> — привітання
        • <code>!extra назва</code> — зберегти швидку команду

        <b>Як дати мені права:</b>
        Зайди в налаштування чату → Адміни → Додати → LyAdminBot, увімкни "видаляти повідомлення" і "банити користувачів".
      about: |
        <b>LyAdminBot</b> — антиспам-бот для Telegram-груп.

        Що вмію:
        ${e.shield} ловлю спам (рулз, сигнатури, AI, голосування)
        ${e.banana} модерація: бан, кік, видалення
        ${e.wave} привітання новим учасникам
        ${e.chart} статистика активності
        ${e.notes} extra-команди (<code>#rules</code>, <code>#faq</code>)

        Мова: українська, english, русский, türkçe, беларуская.
