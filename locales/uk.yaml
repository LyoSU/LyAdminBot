bot_added:
  as_admin: |
    ${e.shield} На варті! Антиспам працює.
    <code>!spam</code> — налаштування
  need_admin: |
    ${e.wave} Привіт! Щоб я міг чистити спам — дайте права адміна (видаляти повідомлення + банити).
    <code>/help</code> — що вмію
  promoted: |
    ${e.shield} Тепер на варті. Спам не пройде.
  demoted: |
    😴 Без прав адміна не зможу банити спамерів. Якщо що — поверніть права.

group:
  start: |
    ${e.shield} Антиспам-бот. Ловлю спам, баню шахраїв.
    <code>!spam</code> — налаштування (адміни)
    <code>/help</code> — всі команди

private:
  start: |
    Йо, <b>${name}</b>! ${e.wave}

    ${e.shield} <b>LyAdminBot</b> — антиспам для груп.
    Ловлю спам, баню шахраїв, чищу рекламу.

    Додай в групу → дай права адміна → готово.
  btn_add: Додати в групу
cmd:
  help: |
    ${e.shield} <b>Модерація</b>
    /banan — мут (${e.reply}). Ще раз — розмут
    /banan 5m — мут на час (m/h/d)
    /kick — вигнати (${e.reply})
    /del — видалити (${e.reply})
    /report — скарга на спам (${e.reply})

    ${e.chart} <b>Стата</b>
    /mystats · /top · /top_banan

    ${e.gear} <b>Інше</b>
    /lang — мова · /ping — статус
    /extras — збережені команди

    ${e.lock} <b>Для адмінів</b> <code>!</code>
    <code>!spam</code> — антиспам налаштування
    <code>!trust</code> — довірені юзери (${e.reply})
    <code>!welcome</code> · <code>!gif</code> · <code>!text</code> — привітання
    <code>!banbase</code> · <code>!banChannel</code> — бани

    <i>${e.reply} = у відповідь</i>
  my_stats:
    send_pm: Стату скинув в особисті ${e.chart}
    chat: |
      ${e.chart} Стата ${name} в <b>${chatName}</b>:

      ${e.banana} <b>Бананів:</b> ${banCount}
      ${e.clock} <b>Всього в бані:</b> ${banTime}
      ${e.zap} <b>Автобан:</b> ${banAutoTime}

      ${e.chat} <b>Повідомлень:</b> ${messages}
      ${e.chart_up} <b>Актив:</b> ${active}%
      🌊 <b>Флуд:</b> ${flood}%

      ${e.calendar} <b>Тут з:</b> ${createdAt}
      ${badge}
    error:
      blocked: |
        Не можу написати тобі в особисті 😅
        Напиши мені першим, і тоді спробуй знову.
    # Easter egg badges based on stats
    badge:
      exemplary: "\n🏅 <i>Зразковий громадянин</i>"
      collector: "\n${e.banana} <i>Колекціонер бананів</i>"
      soul: "\n${e.masks} <i>Душа компанії</i>"
      flood_master: "\n🌊 <i>Майстер потоку</i>"
      silent: "\n🤫 <i>Тихий спостерігач</i>"
      veteran: "\n🎖 <i>Ветеран чату</i>"
      newbie: "\n🐣 <i>Новачок</i>"
  top:
    info: |
      ${e.trophy} Топ активних в <b>${chatName}</b>:
      ${top}
  top_banan:
    info: |
      ${e.banana} Топ по бананах в <b>${chatName}</b>:
      ${top}
    error:
      empty: Тут ще ніхто не отримував ${e.banana}
    # Titles for leaderboard positions
    titles:
      1: "${e.crown}"
      2: "🥈"
      3: "🥉"
    # Fun titles at the end
    crown: "${e.crown} Банановий король"
    dominator: "${e.trophy} Домінатор мутів"
    veteran: "🎖 Ветеран тиші"
  extras:
    list: |
      ${e.notes} <b>Extra команди:</b>
      ${extras}
    error:
      not_found: |
        Поки що немає extra команд.
        Адмін може створити: <code>!extra назва</code>
  ping:
      pong: |
        🏓 Pong!
        <b>Сервер:</b> ${sms} мс
        <b>Telegram:</b> ${tms} мс
        <b>Аптайм:</b> ${workTime}

        ${extra}
      delay: |
        ❗️ <b>Бот був офлайн:</b> ${delayTime}
      # Easter eggs for ping (rare)
      easter:
        fast: |
          ${e.zap} Блискавичний понг!
          <b>Сервер:</b> ${sms} мс
          <b>Telegram:</b> ${tms} мс
          <b>Аптайм:</b> ${workTime}

          ${extra}
        slow: |
          🐌 Понг... нарешті
          <b>Сервер:</b> ${sms} мс
          <b>Telegram:</b> ${tms} мс
          <b>Аптайм:</b> ${workTime}

          ${extra}
  welcome:
    disable: Привітання вимкнено ${e.wave}
    enable: Привітання увімкнено ${e.wave}
  gif:
    push: Gif додано ✓
    pull: Gif видалено ✓
    reset: Всі gif очищено ✓
  text:
    push: Текст додано ✓
    pull: Текст видалено ✓
    error: Текст має містити <code>%name%</code>
    reset: Всі тексти очищено ✓
  extra:
    push: \#${extraName} збережено ✓
    pull: \#${extraName} видалено ✓
    max: Максимум extra в повідомленні — <b>${maxExtra}</b>
    error:
      not_found: |
        \#${extraName} не знайдено.
        Щоб створити — напиши команду у відповідь на повідомлення.
  members:
    member: |
      <a href="tg://user?id=${telegram_id}">${telegram_id}</a>
      ${banTime} | a: ${active} | f: ${flood}
  quote: |
    Для цитат юзай @QuotLyBot
  banDatabase:
    disable: Глобальну бан-базу вимкнено
    enable: Глобальну бан-базу увімкнено
  banChannel:
    disable: Бан каналів вимкнено
    enable: Бан каналів увімкнено
  spam_settings:
    enabled: "${e.check} <b>Антиспам увімкнено</b>"
    disabled: "${e.cross} <b>Антиспам вимкнено</b>"
    allow:
      added: "${e.check} Дозволено: \"${rule}\""
      error: "${e.cross} Вкажи текст правила\n\n<b>Приклад:</b> <code>!spam allow продаж курсових</code>"
    deny:
      added: "${e.check} Заборонено: \"${rule}\""
      error: "${e.cross} Вкажи текст правила\n\n<b>Приклад:</b> <code>!spam deny реклама заробітку</code>"
    remove:
      success: "${e.check} Правило видалено: \"${rule}\""
      error: "${e.cross} Невірний номер правила\n\nГлянь список: <code>!spam</code>"
    clear: "${e.check} Правила очищено (було: ${count})"
    globalban:
      enabled: "${e.check} <b>Глобальний бан увімкнено</b>\nСпамери з інших груп теж будуть забанені тут"
      disabled: "${e.cross} <b>Глобальний бан вимкнено</b>\nБани діють тільки в цій групі"
      error: "Юзай <code>!spam globalban on</code> або <code>!spam globalban off</code>"
    threshold:
      set: "${e.check} <b>Чутливість:</b> ${value}%\n\nВище = менше помилок, але може щось пропустити"
      error: "${e.cross} Від 50 до 95\n\n<code>!spam threshold 75</code>"
    status:
      title: "${e.shield} <b>Налаштування антиспаму</b>"
      enabled_text: "${e.check} Увімкнено"
      disabled_text: "${e.cross} Вимкнено"
      globalban_enabled: "${e.check} Так"
      globalban_disabled: "${e.cross} Ні"
      rules_title: "Правила (${count}):"
      rules_empty: "Не налаштовано"
      rule_allow: "${e.check} Дозволити"
      rule_deny: "${e.cross} Заборонити"
      commands_title: "Команди:"
      trusted_users: "юзерів"
      commands: |
        <code>!spam on</code> — увімкнути
        <code>!spam off</code> — вимкнути
        <code>!spam globalban on/off</code> — глобальний бан
        <code>!spam threshold 50-95</code> — чутливість
        <code>!spam trust</code> — довіряти (у відповідь)
        <code>!spam untrust</code> — не довіряти (у відповідь)
        <code>!spam allow текст</code> — дозволити
        <code>!spam deny текст</code> — заборонити
        <code>!spam remove N</code> — видалити правило
        <code>!spam clear</code> — очистити все
    trust:
      usage: "<b>Як юзати:</b>\n• У відповідь: <code>!spam trust</code>\n• По юзернейму: <code>!spam trust @username</code>\n• По ID: <code>!spam trust 123456</code>"
      cant_trust_bot: "${e.robot} Ботів не можна"
      already_trusted: "${e.check} ${name} вже в довірених"
      added: "${e.check} ${name} тепер в довірених"
      user_not_found: "${e.cross} Не знайшов ${username}"
    untrust:
      usage: "<b>Як юзати:</b>\n• У відповідь: <code>!spam untrust</code>\n• По юзернейму: <code>!spam untrust @username</code>\n• По ID: <code>!spam untrust 123456</code>"
      not_trusted: "${e.cross} ${name} і так не в довірених"
      removed: "${e.check} ${name} більше не в довірених"
      user_not_found: "${e.cross} Не знайшов ${username}"
    btn:
      enable: "Увімкнути"
      disable: "Вимкнути"
      globalban_on: "Глоб. бан: так"
      globalban_off: "Глоб. бан: ні"
      rules: "Правила"
      trusted: "Довірені"
      help: "Команди"
    cb:
      enabled: "Увімкнено"
      disabled: "Вимкнено"
      globalban_on: "Глобальний бан увімкнено"
      globalban_off: "Глобальний бан вимкнено"
      rules_title: "Правила"
      trusted_title: "Довірені"
      no_rules: "Правил немає"
      no_trusted: "Довірених немає"
      error: "Помилка"
  reset: Налаштування скинуто ✓
settings:
    json:
      reset: Налаштування відновлено з файлу ✓
