bot_added:
  as_admin: |
    ${e.shield} На варце! Антыспам працуе.
    <code>!spam</code> — налады
  need_admin: |
    ${e.wave} Прывітанне! Каб чысціць спам — дай правы адміна (выдаляць паведамленні + баніць).
    <code>/help</code> — што ўмею
  promoted: |
    ${e.shield} Цяпер на варце. Спам не пройдзе.
  demoted: |
    😴 Без правоў адміна не змагу баніць спамераў. Калі што — вярні правы.

group:
  start: |
    ${e.shield} Антыспам-бот. Лаўлю спам, баню ашуканцаў.
    <code>!spam</code> — налады (адміны)
    <code>/help</code> — усе каманды

private:
  start: |
    Прывітанне, <b>${name}</b>! ${e.wave}

    ${e.shield} <b>LyAdminBot</b> — антыспам для груп.
    Лаўлю спам, баню ашуканцаў, чышчу рэкламу.

    Дадай у групу → дай правы адміна → гатова.
  btn_add: Дадаць у групу
cmd:
  help: |
    ${e.robot} <b>LyAdminBot</b>

    ${e.shield} <b>АНТЫСПАМ:</b>
    <code>!spam</code> — налады
    <code>!spam on/off</code> — укл/выкл
    <code>!spam globalban on/off</code> — глабальны бан
    <code>!banbase</code> — глабальная бан-база

    ${e.banana} <b>МАДЭРАЦЫЯ:</b>
    /banan — бан  •  /kick — кік  •  /del — выдаліць
    /ping — статус

    ${e.chart} <b>СТАТЫСТЫКА:</b>
    /mystats — твая стата
    /top — топ актыўных  •  /top_banan — топ банаў

    ${e.wave} <b>ПРЫВІТАННІ:</b>
    <code>!welcome</code> — укл/выкл
    <code>!gif</code> / <code>!text</code> — дадаць кантэнт

    ${e.gear} <b>ІНШАЕ:</b>
    <code>!extra назва</code> — хуткія каманды #назва
    /extras — спіс  •  /lang — мова
  my_stats:
    send_pm: Стату скінуў у асабістыя ${e.chart}
    chat: |
      ${e.chart} Стата ${name} у <b>${chatName}</b>:

      ${e.banana} <b>Бананаў:</b> ${banCount}
      ${e.clock} <b>Усяго ў бане:</b> ${banTime}
      ${e.zap} <b>Аўтабан:</b> ${banAutoTime}

      ${e.chat} <b>Вестак:</b> ${messages}
      ${e.chart_up} <b>Актыў:</b> ${active}%
      🌊 <b>Флуд:</b> ${flood}%

      ${e.calendar} <b>Тут з:</b> ${createdAt}
    error:
      blocked: |
        Не магу напісаць табе ў асабістыя 😅
        Напішы мне першым, і тады паспрабуй зноў.
  top:
    info: |
      ${e.trophy} Топ актыўных у <b>${chatName}</b>:
      ${top}
  top_banan:
    info: |
      ${e.banana} Топ па бананах у <b>${chatName}</b>:
      ${top}
    error:
      empty: Тут яшчэ ніхто не атрымліваў ${e.banana}
    titles:
      1: "${e.crown}"
      2: "🥈"
      3: "🥉"
    crown: "${e.crown} Бананавы кароль"
  extras:
    list: |
      ${e.notes} <b>Extra каманды:</b>
      ${extras}
    error:
      not_found: |
        Пакуль няма extra каманд.
        Адмін можа стварыць: <code>!extra назва</code>
  ping:
      pong: |
        🏓 Pong!
        <b>Сервер:</b> ${sms} мс
        <b>Telegram:</b> ${tms} мс
        <b>Аптайм:</b> ${workTime}

        ${extra}
      delay: |
        ❗️ <b>Бот быў афлайн:</b> ${delayTime}
  welcome:
    disable: Прывітанні выключаны ${e.wave}
    enable: Прывітанні ўключаны ${e.wave}
  gif:
    push: Gif дададзены ✓
    pull: Gif выдалены ✓
    reset: Усе gif ачышчаны ✓
  text:
    push: Тэкст дададзены ✓
    pull: Тэкст выдалены ✓
    error: Тэкст павінен утрымліваць <code>%name%</code>
    reset: Усе тэксты ачышчаны ✓
  extra:
    push: \#${extraName} захавана ✓
    pull: \#${extraName} выдалена ✓
    max: Максімум extra у паведамленні — <b>${maxExtra}</b>
    error:
      not_found: |
        \#${extraName} не знойдзена.
        Каб стварыць — напішы каманду ў адказ на паведамленне.
  members:
    member: |
      <a href="tg://user?id=${telegram_id}">${telegram_id}</a>
      ${banTime} | a: ${active} | f: ${flood}
  banDatabase:
    disable: Глабальная бан-база выключана
    enable: Глабальная бан-база ўключана
  spam_settings:
    enabled: "${e.check} <b>Антыспам уключаны</b>"
    disabled: "${e.cross} <b>Антыспам выключаны</b>"
    allow:
      added: "${e.check} Дазволена: \"${rule}\""
      error: "${e.cross} Укажы тэкст правіла\n\n<b>Прыклад:</b> <code>!spam allow продаж курсавых</code>"
    deny:
      added: "${e.check} Забаронена: \"${rule}\""
      error: "${e.cross} Укажы тэкст правіла\n\n<b>Прыклад:</b> <code>!spam deny рэклама заробку</code>"
    remove:
      success: "${e.check} Правіла выдалена: \"${rule}\""
      error: "${e.cross} Няправільны нумар правіла\n\nГлянь спіс: <code>!spam</code>"
    clear: "${e.check} Правілы ачышчаны (было: ${count})"
    globalban:
      enabled: "${e.check} <b>Глабальны бан уключаны</b>\nСпамеры з іншых груп таксама будуць забанены тут"
      disabled: "${e.cross} <b>Глабальны бан выключаны</b>\nБаны дзейнічаюць толькі ў гэтай групе"
      error: "Выкарыстоўвай <code>!spam globalban on</code> або <code>!spam globalban off</code>"
    status:
      title: "${e.shield} <b>Налады антыспаму</b>"
      enabled_text: "${e.check} Уключана"
      disabled_text: "${e.cross} Выключана"
      globalban_enabled: "${e.check} Так"
      globalban_disabled: "${e.cross} Не"
      rules_title: "Правілы (${count}):"
      rules_empty: "Не наладжана"
      rule_allow: "${e.check} Дазволіць"
      rule_deny: "${e.cross} Забараніць"
      commands_title: "Каманды:"
      commands: |
        <code>!spam on</code> — уключыць
        <code>!spam off</code> — выключыць
        <code>!spam globalban on/off</code> — глабальны бан
        <code>!spam allow тэкст</code> — дазволіць
        <code>!spam deny тэкст</code> — забараніць
        <code>!spam remove нумар</code> — выдаліць правіла
        <code>!spam clear</code> — ачысціць усе правілы
  reset: Налады скінуты ✓
settings:
    json:
      reset: Налады адноўлены з файла ✓
banan:
  show: ${name} паказвае ${e.banana}
  suc:  ${name} атрымлівае ${e.banana}\n<b>На:</b> ${duration}
  pick: ${name} пазбавіўся ${e.banana}
  error: "${e.cross} Не магу замуціць"
  error_admin: "${e.cross} Адмінаў не муцяць 😏"
  error_left: "${e.cross} Ужо не ў чаце"
  error_no_rights: "${e.cross} Дай мне правы баніць"
  cant_ban_linked_channel: "${e.cross} Нельга баніць прывязаны канал"
  easter:
    nice: "${name} атрымлівае ${e.banana}\n<b>На:</b> ${duration}\n\n<i>nice</i>"
    blaze: "${name} атрымлівае ${e.banana}${e.fire}\n<b>На:</b> ${duration}\n\n<i>blaze it</i>"
    huge: "${name} атрымлівае БАНАНІШЧА ${e.banana}${e.banana}${e.banana}\n<b>На:</b> ${duration}"
    self: "${name} паказвае ${e.banana} сам сабе\n<b>На:</b> ${duration}\n<i>паважаю рашэнне</i>"
    self_again: "${name} зноў паказвае ${e.banana} сам сабе\n<b>На:</b> ${duration}\n<i>гэта ўжо традыцыя?</i>"
    self_legend: "${name} паказвае ${e.banana} сам сабе\n<b>На:</b> ${duration}\n<i>легенда самамадэрацыі</i>"
kick:
  suc: ${name} вылятае з чата 👢
  who: Каго кікнуць? 🤔
  error: "${e.cross} Не магу кікнуць"
  error_admin: "${e.cross} Адмінаў не кікаюць"
  error_left: "${e.cross} Ужо не ў чаце"
  error_no_rights: "${e.cross} Дай мне правы баніць"
  easter:
    self: "${name} сам сябе кікнуў 👢\n<i>паважаю</i>"
del:
  error: "${e.cross} Не магу выдаліць"
  error_no_rights: "${e.cross} Дай мне правы выдаляць"
  error_old: "${e.cross} Занадта старое паведамленне"

global_ban:
  # Legacy `kicked` key removed — notification via mod_event.compact.global_ban.

