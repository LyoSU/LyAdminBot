menu:
  unknown: "Меню не знойдзена"
  error: "Памылка"
  access:
    only_admins: "🔒 Толькі для адмінаў групы"
    only_initiator: "🔒 Націсні каманду сам"
    only_initiator_or_admin: "🔒 Толькі ініцыятар або адмін групы"
    denied: "Доступ забаронены"
  saved: "✓ Захавана"
  cancelled: "↩️ Скасавана"
  session_expired: "⏱ Сесія састарэла"
  start:
    private: |
      ${e.shield} Прывітанне, <b>${name}</b>! ${e.wave}

      <b>LyAdminBot</b> — антыспам для груп.
      Лаўлю спам · баню ашуканцаў · чышчу рэкламу.

      <b>Хуткі старт:</b>
      1. Дадай у групу
      2. Дай правы адміна
      3. Гатова — я сам разбяруся.
    group: |
      ${e.shield} Антыспам працуе. <code>/help</code> — што ўмею.
    placeholder: "Гэтая функцыя будзе актываваная неўзабаве. Паспрабуй <code>/settings</code> праз хвіліну."
    btn:
      add: "➕ Дадаць у групу"
      help: "📖 Дапамога"
      lang: "🌐 Мова"
  help:
    title: "${e.shield} <b>LyAdminBot · Дапамога</b>"
    only_initiator: "🔒 Націсні /help сам, каб адкрыць меню"
    tab_label:
      start: "🛡 Старт"
      mod: "⚔️ Мадэрацыя"
      stats: "📊 Статыстыка"
      admin: "🔧 Адмін"
      about: "💬 Пра бота"
    body:
      start: |
        Я лаўлю спам у групах аўтаматычна — дадай мяне і зрабі адмінам.

        <b>Хуткі старт:</b>
        1. Дадай у групу
        2. Дай правы адміна (выдаляць паведамленні + баніць)
        3. Напішы ў групе <code>/ping</code>, каб праверыць

        Асноўныя каманды:
        • <code>/help</code> — гэтае меню
        • <code>/lang</code> — выбраць мову
        • <code>/ping</code> — ці жывы бот
      mod: |
        Для адмінаў у адказ (${e.reply}) на паведамленне:
        • <code>/banan</code> — мут. Яшчэ раз — размут
        • <code>/banan 5m</code> — мут на час (m/h/d)
        • <code>/kick</code> — выгнаць з групы
        • <code>/del</code> — выдаліць паведамленне
        • <code>/report</code> — скарга на спам (можа кожны)

        <i>${e.reply} — трэба адказаць на паведамленне</i>
      stats: |
        Твая статыстыка актыўнасці ў чаце:
        • <code>/mystats</code> — бананы, паведамленні, актыў (у асабістыя)
        • <code>/top</code> — самыя актыўныя
        • <code>/top_banan</code> — топ калекцыянераў бананаў

        <i>Толькі для груп.</i>
      admin: |
        Для адмінаў:
        • <code>/settings</code> — панэль наладаў чата
        • <code>!spam</code> — антыспам (alias, мігруе)
        • <code>!welcome</code>, <code>!gif</code>, <code>!text</code> — прывітанні
        • <code>!extra назва</code> — захаваць хуткую каманду

        <b>Як даць мне правы:</b>
        Зайдзі ў налады чата → Адміны → Дадаць → LyAdminBot, уключы «выдаляць паведамленні» і «баніць карыстальнікаў».
      about: |
        <b>LyAdminBot</b> — антыспам-бот для Telegram-груп.

        Што ўмею:
        ${e.shield} лаўлю спам (правілы, сігнатуры, AI, галасаванне)
        ${e.banana} мадэрацыя: бан, кік, выдаленне
        ${e.wave} прывітанні новым удзельнікам
        ${e.chart} статыстыка актыўнасці
        ${e.notes} extra-каманды (<code>#rules</code>, <code>#faq</code>)

        Мовы: українська, english, русский, türkçe, беларуская.
        <i>Без сцягоў — мова, а не палітыка.</i>
  onboarding:
    card: |
      ${e.shield} Прывітанне! Я тут, антыспам актыўны.

      <b>Хуткія налады (60 секунд):</b>

      🌐 Мова: <b>${language}</b> (auto)
      🎚 Чуласць: <b>${threshold}%</b> (${sensitivityLabel})
      👋 Прывітанне: <b>${welcomeState}</b>
    ack: "👌 Гатова — працую на варце"
    config_soon: "Налады будуць актыўныя неўзабаве, паспрабуй /settings праз хвіліну"
    sensitivity:
      low: "мяккая"
      mid: "сярэдняя"
      high: "строгая"
    welcome:
      on: "уключана"
      off: "выключана"
    btn:
      ack: "✓ Так падыходзіць"
      config: "🔧 Наладзіць"
  settings:
    root:
      title: "⚙️ <b>Налады чата</b>"
      text: |
        ⚙️ <b>Налады чата</b>

        🛡 Антыспам: <b>${antispamState}</b> · парог <b>${threshold}%</b>
        👋 Прывітанне: <b>${welcomeState}</b> (${welcomeCount})
        🌍 Бан-база: <b>${banDatabaseState}</b>
        📺 Бан каналаў: <b>${banChannelState}</b>
        📝 Extras: <b>${extrasCount}</b>/<b>${extrasMax}</b>
        🌐 Мова: <b>${language}</b>
      btn:
        antispam: "🛡 Антыспам"
        welcome: "👋 Прывітанне"
        banDatabase: "🌍 Бан-база"
        banChannel: "📺 Бан каналаў"
        extras: "📝 Extras"
        lang: "🌐 Мова"
        modlog: "📋 Журнал"
        diag: "⚙️ Дыягностыка"
        export: "📤 Экспарт JSON"
        reset: "♻️ Скінуць"
    common:
      back: "← Назад"
      close: "✕ Закрыць"
      saved: "✓ Захавана"
      on: "уключана"
      off: "выключана"
