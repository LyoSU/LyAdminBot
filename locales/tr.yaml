  expanded:
    confidence_line: "📊 ${confidence}% · 🤖 ${reason}"
    preview_line: "📝 «${preview}»"
    warning_line: "⚠️ ${warning}"
  btn:
    why: "🤨 Neden?"
    why_alt: "🤨 Ne oldu?"
    less: "🛡 Detayı azalt"
    hide: "✓ Gizle"
    undo: "↩️ Engeli kaldır"
    vote_spam: "🚫 ${n}"
    vote_clean: "✅ ${n}"
