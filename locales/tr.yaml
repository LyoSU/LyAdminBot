bot_added:
  as_admin: |
    ${e.shield} Korumadayım! Anti-spam çalışıyor.
    <code>!spam</code> — ayarlar
  need_admin: |
    ${e.wave} Selam! Spam temizlemek için admin yetkileri ver (mesaj silme + banlama).
    <code>/help</code> — neler yapabilirim
  promoted: |
    ${e.shield} Artık korumadayım. Spam geçemez.
  demoted: |
    😴 Admin yetkileri olmadan spamcıları banlayamam. Gerekirse yetkileri geri ver.

group:
  start: |
    ${e.shield} Anti-spam bot. Spam yakalıyorum, dolandırıcıları banlıyorum.
    <code>!spam</code> — ayarlar (adminler)
    <code>/help</code> — tüm komutlar

private:
  start: |
    Selam <b>${name}</b>! ${e.wave}

    ${e.shield} <b>LyAdminBot</b> — gruplar için anti-spam.
    Spam yakalıyorum, dolandırıcıları banlıyorum, reklamları temizliyorum.

    Gruba ekle → admin yap → tamam.
  btn_add: Gruba ekle
cmd:
  help: |
    ${e.robot} <b>LyAdminBot</b>

    ${e.shield} <b>ANTİ-SPAM:</b>
    <code>!spam</code> — ayarlar
    <code>!spam on/off</code> — aç/kapa
    <code>!spam globalban on/off</code> — global ban
    <code>!banbase</code> — global ban veritabanı

    ${e.banana} <b>MODERASYON:</b>
    /banan — ban  •  /kick — at  •  /del — sil
    /ping — durum

    ${e.chart} <b>İSTATİSTİKLER:</b>
    /mystats — senin istatistiklerin
    /top — en aktifler  •  /top_banan — en çok ban alanlar

    ${e.wave} <b>KARŞILAMA:</b>
    <code>!welcome</code> — aç/kapa
    <code>!gif</code> / <code>!text</code> — içerik ekle

    ${e.gear} <b>DİĞER:</b>
    <code>!extra isim</code> — hızlı komutlar #isim
    /extras — liste  •  /lang — dil
  ping:
      pong: |
        🏓 Pong!
        <b>Sunucu:</b> ${sms} ms
        <b>Telegram:</b> ${tms} ms
        <b>Çalışma süresi:</b> ${workTime}

        ${extra}
      delay: |
        ❗️ <b>Bot çevrimdışıydı:</b> ${delayTime}
  welcome:
    disable: Karşılama kapalı ${e.wave}
    enable: Karşılama açık ${e.wave}
  gif:
    push: Gif eklendi ✓
    pull: Gif silindi ✓
  text:
    push: Metin eklendi ✓
    pull: Metin silindi ✓
    error: Metin <code>%name%</code> içermeli
  extra:
    push: \#${extraName} kaydedildi ✓
    pull: \#${extraName} silindi ✓
    error:
      not_found: |
        \#${extraName} bulunamadı.
        Oluşturmak için — mesaja yanıt olarak komutu yaz.
  banDatabase:
    disable: Global ban veritabanı kapalı
    enable: Global ban veritabanı açık
  spam_settings:
    enabled: "${e.check} <b>Anti-spam açık</b>"
    disabled: "${e.cross} <b>Anti-spam kapalı</b>"
    allow:
      added: "${e.check} İzin verildi: \"${rule}\""
      error: "${e.cross} Kural metnini belirt\n\n<b>Örnek:</b> <code>!spam allow ödev satışı</code>"
    deny:
      added: "${e.check} Yasaklandı: \"${rule}\""
      error: "${e.cross} Kural metnini belirt\n\n<b>Örnek:</b> <code>!spam deny kazanç reklamları</code>"
    remove:
      success: "${e.check} Kural silindi: \"${rule}\""
      error: "${e.cross} Geçersiz kural numarası\n\nListeye bak: <code>!spam</code>"
    clear: "${e.check} Kurallar temizlendi (eski: ${count})"
    globalban:
      enabled: "${e.check} <b>Global ban açık</b>\nDiğer gruplardaki spamcılar burada da banlanacak"
      disabled: "${e.cross} <b>Global ban kapalı</b>\nBanlar sadece bu grupta geçerli"
      error: "<code>!spam globalban on</code> veya <code>!spam globalban off</code> kullan"
    status:
      title: "${e.shield} <b>Anti-spam ayarları</b>"
      enabled_text: "${e.check} Açık"
      disabled_text: "${e.cross} Kapalı"
      globalban_enabled: "${e.check} Evet"
      globalban_disabled: "${e.cross} Hayır"
      rules_title: "Kurallar (${count}):"
      rules_empty: "Ayarlanmamış"
      rule_allow: "${e.check} İzin ver"
      rule_deny: "${e.cross} Yasak"
      commands_title: "Komutlar:"
      commands: |
        <code>!spam on</code> — aç
        <code>!spam off</code> — kapat
        <code>!spam globalban on/off</code> — global ban
        <code>!spam allow metin</code> — izin ver
        <code>!spam deny metin</code> — yasak
        <code>!spam remove numara</code> — kuralı sil
        <code>!spam clear</code> — tüm kuralları temizle
  reset: Ayarlar sıfırlandı ✓
banan:
  show: ${name} ${e.banana} gösteriyor
  suc:  ${name} ${e.banana} alıyor\n<b>Süre:</b> ${duration}
  pick: ${name} ${e.banana} kaybetti
  error: "${e.cross} Susturamıyorum"
  error_admin: "${e.cross} Adminler susturulamaz 😏"
  error_left: "${e.cross} Zaten gruptan ayrılmış"
  error_no_rights: "${e.cross} Bana banlama yetkisi ver"
  cant_ban_linked_channel: "${e.cross} Bağlı kanal engellenemez"
  easter:
    nice: "${name} ${e.banana} alıyor\n<b>Süre:</b> ${duration}\n\n<i>nice</i>"
    blaze: "${name} ${e.banana}${e.fire} alıyor\n<b>Süre:</b> ${duration}\n\n<i>blaze it</i>"
    huge: "${name} DEV MUZ ${e.banana}${e.banana}${e.banana} alıyor\n<b>Süre:</b> ${duration}"
    self: "${name} kendine ${e.banana} gösteriyor\n<b>Süre:</b> ${duration}\n<i>karara saygı</i>"
    self_again: "${name} yine kendine ${e.banana} gösteriyor\n<b>Süre:</b> ${duration}\n<i>bu artık gelenek mi?</i>"
kick:
  suc: ${name} gruptan atıldı 👢
  who: Kimi atayım? 🤔
  error: "${e.cross} Atamıyorum"
  error_admin: "${e.cross} Adminler atılamaz"
  error_left: "${e.cross} Zaten gruptan ayrılmış"
  error_no_rights: "${e.cross} Bana banlama yetkisi ver"
  easter:
    self: "${name} kendini attı 👢\n<i>saygılar</i>"
del:
  error: "${e.cross} Silemiyorum"
  error_no_rights: "${e.cross} Bana silme yetkisi ver"
  error_old: "${e.cross} Mesaj çok eski"

global_ban:
  kicked: "${e.ban} ${name} atıldı — global ban.\n<code>${reason}</code>"
