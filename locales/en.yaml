bot_added:
  as_admin: |
    ${e.shield} On guard! Anti-spam is active.
    <code>!spam</code> — settings
  need_admin: |
    ${e.wave} Hey! To clean spam — make me admin (delete messages + ban users).
    <code>/help</code> — what I can do
  promoted: |
    ${e.shield} Now on guard. No spam gets through.
  demoted: |
    😴 Can't ban spammers without admin rights. Give them back if needed.

group:
  start: |
    ${e.shield} Anti-spam bot. Catching spam, banning scammers.
    <code>!spam</code> — settings (admins)
    <code>/help</code> — all commands

private:
  start: |
    Hey <b>${name}</b>! ${e.wave}

    ${e.shield} <b>LyAdminBot</b> — anti-spam for groups.
    Catching spam, banning scammers, cleaning ads.

    Add to group → make admin → done.
  btn_add: Add to group
cmd:
  help: |
    ${e.shield} <b>Moderation</b>
    /banan — mute (${e.reply}). Again — unmute
    /banan 5m — timed mute (m/h/d)
    /kick — remove (${e.reply})
    /del — delete (${e.reply})
    /report — report spam (${e.reply})

    ${e.chart} <b>Stats</b>
    /mystats · /top · /top_banan

    ${e.gear} <b>Other</b>
    /lang — language · /ping — status
    /extras — saved commands

    ${e.lock} <b>Admins only</b> <code>!</code>
    <code>!spam</code> — anti-spam settings
    <code>!trust</code> — trusted users (${e.reply})
    <code>!welcome</code> · <code>!gif</code> · <code>!text</code> — welcome
    <code>!banbase</code> · <code>!banChannel</code> — bans

    <i>${e.reply} = reply to message</i>
  my_stats:
    send_pm: Stats sent to DM ${e.chart}
    chat: |
      ${e.chart} ${name}'s stats in <b>${chatName}</b>:

      ${e.banana} <b>Bananas:</b> ${banCount}
      ${e.clock} <b>Total ban time:</b> ${banTime}
      ${e.zap} <b>Autoban:</b> ${banAutoTime}

      ${e.chat} <b>Messages:</b> ${messages}
      ${e.chart_up} <b>Activity:</b> ${active}%
      🌊 <b>Flood:</b> ${flood}%

      ${e.calendar} <b>Here since:</b> ${createdAt}
      ${badge}
    error:
      blocked: |
        Can't DM you 😅
        Message me first, then try again.
    badge:
      exemplary: "\n🏅 <i>Model citizen</i>"
      collector: "\n${e.banana} <i>Banana collector</i>"
      soul: "\n${e.masks} <i>Life of the party</i>"
      flood_master: "\n🌊 <i>Flood master</i>"
      silent: "\n🤫 <i>Silent observer</i>"
      veteran: "\n🎖 <i>Chat veteran</i>"
      newbie: "\n🐣 <i>Newbie</i>"
  top:
    info: |
      ${e.trophy} Most active in <b>${chatName}</b>:
      ${top}
  top_banan:
    info: |
      ${e.banana} Top bans in <b>${chatName}</b>:
      ${top}
    error:
      empty: No one got ${e.banana} here yet
    titles:
      1: "${e.crown}"
      2: "🥈"
      3: "🥉"
    crown: "${e.crown} Banana King"
    dominator: "${e.trophy} Mute Dominator"
    veteran: "🎖 Silence Veteran"
  extras:
    list: |
      ${e.notes} <b>Extra commands:</b>
      ${extras}
    error:
      not_found: |
        No extra commands yet.
        Admin can create: <code>!extra name</code>
  ping:
      pong: |
        🏓 Pong!
        <b>Server:</b> ${sms} ms
        <b>Telegram:</b> ${tms} ms
        <b>Uptime:</b> ${workTime}

        ${extra}
      delay: |
        ❗️ <b>Bot was offline:</b> ${delayTime}
      easter:
        fast: |
          ${e.zap} Lightning pong!
          <b>Server:</b> ${sms} ms
          <b>Telegram:</b> ${tms} ms
          <b>Uptime:</b> ${workTime}

          ${extra}
        slow: |
          🐌 Pong... finally
          <b>Server:</b> ${sms} ms
          <b>Telegram:</b> ${tms} ms
          <b>Uptime:</b> ${workTime}

          ${extra}
  welcome:
    disable: Welcome messages off ${e.wave}
    enable: Welcome messages on ${e.wave}
  gif:
    push: Gif added ✓
    pull: Gif removed ✓
    reset: All gifs cleared ✓
  text:
    push: Text added ✓
    pull: Text removed ✓
    error: Text must contain <code>%name%</code>
    reset: All texts cleared ✓
  extra:
    push: \#${extraName} saved ✓
    pull: \#${extraName} deleted ✓
    max: Max extras per message — <b>${maxExtra}</b>
    error:
      not_found: |
        \#${extraName} not found.
        To create — reply to a message with the command.
    set:
  members:
    member: |
      <a href="tg://user?id=${telegram_id}">${telegram_id}</a>
      ${banTime} | a: ${active} | f: ${flood}
  quote: |
    For quotes use @QuotLyBot
  banDatabase:
    disable: Global ban database off
    enable: Global ban database on
  banChannel:
    disable: Channel ban off
    enable: Channel ban on
  spam_settings:
    enabled: "${e.check} <b>Anti-spam on</b>"
    disabled: "${e.cross} <b>Anti-spam off</b>"
    allow:
      added: "${e.check} Allowed: \"${rule}\""
      error: "${e.cross} Specify rule text\n\n<b>Example:</b> <code>!spam allow coursework sales</code>"
    deny:
      added: "${e.check} Blocked: \"${rule}\""
      error: "${e.cross} Specify rule text\n\n<b>Example:</b> <code>!spam deny earning schemes</code>"
    remove:
      success: "${e.check} Rule removed: \"${rule}\""
      error: "${e.cross} Invalid rule number\n\nCheck list: <code>!spam</code>"
    clear: "${e.check} Rules cleared (was: ${count})"
    globalban:
      enabled: "${e.check} <b>Global ban on</b>\nSpammers from other groups will be banned here too"
      disabled: "${e.cross} <b>Global ban off</b>\nBans only apply to this group"
      error: "Use <code>!spam globalban on</code> or <code>!spam globalban off</code>"
    threshold:
      set: "${e.check} <b>Sensitivity:</b> ${value}%\n\nHigher = fewer mistakes, but may miss some spam"
      error: "${e.cross} Must be 50-95\n\n<code>!spam threshold 75</code>"
    status:
      title: "${e.shield} <b>Anti-spam settings</b>"
      enabled_text: "${e.check} On"
      disabled_text: "${e.cross} Off"
      globalban_enabled: "${e.check} Yes"
      globalban_disabled: "${e.cross} No"
      rules_title: "Rules (${count}):"
      rules_empty: "Not set"
      rule_allow: "${e.check} Allow"
      rule_deny: "${e.cross} Block"
      commands_title: "Commands:"
      trusted_users: "users"
      commands: |
        <code>!spam on</code> — enable
        <code>!spam off</code> — disable
        <code>!spam globalban on/off</code> — global ban
        <code>!spam threshold 50-95</code> — sensitivity
        <code>!spam trust</code> — trust user (reply)
        <code>!spam untrust</code> — untrust user (reply)
        <code>!spam allow text</code> — allow
        <code>!spam deny text</code> — block
        <code>!spam remove N</code> — remove rule
        <code>!spam clear</code> — clear all
    trust:
      usage: "<b>How to use:</b>\n• Reply: <code>!spam trust</code>\n• Username: <code>!spam trust @username</code>\n• ID: <code>!spam trust 123456</code>"
      cant_trust_bot: "${e.robot} Can't trust bots"
      already_trusted: "${e.check} ${name} already trusted"
      added: "${e.check} ${name} now trusted"
      user_not_found: "${e.cross} Can't find ${username}"
    untrust:
      usage: "<b>How to use:</b>\n• Reply: <code>!spam untrust</code>\n• Username: <code>!spam untrust @username</code>\n• ID: <code>!spam untrust 123456</code>"
      not_trusted: "${e.cross} ${name} wasn't trusted anyway"
      removed: "${e.check} ${name} no longer trusted"
      user_not_found: "${e.cross} Can't find ${username}"
    btn:
      enable: "Enable"
      disable: "Disable"
      globalban_on: "Global ban: on"
      globalban_off: "Global ban: off"
      rules: "Rules"
      trusted: "Trusted"
      help: "Commands"
    cb:
      enabled: "Enabled"
      disabled: "Disabled"
      globalban_on: "Global ban on"
      globalban_off: "Global ban off"
      rules_title: "Rules"
      trusted_title: "Trusted users"
      no_rules: "No rules"
      no_trusted: "No trusted users"
      error: "Error"
  reset: Settings reset ✓
settings:
    json:
      reset: Settings restored from file ✓
banan:
  show: ${name} shows ${e.banana}
  suc:  ${name} gets ${e.banana}\n<b>For:</b> ${duration}
  pick: ${name} lost ${e.banana}
  error: "${e.cross} Can't mute"
  error_admin: "${e.cross} Can't mute admins 😏"
  error_left: "${e.cross} Already left"
  error_no_rights: "${e.cross} Give me ban permissions"
  cant_ban_linked_channel: "${e.cross} Can't ban the linked channel"
  easter:
    nice: "${name} gets ${e.banana}\n<b>For:</b> ${duration}\n\n<i>nice</i>"
    blaze: "${name} gets ${e.banana}${e.fire}\n<b>For:</b> ${duration}\n\n<i>blaze it</i>"
    huge: "${name} gets MEGA BANANA ${e.banana}${e.banana}${e.banana}\n<b>For:</b> ${duration}"
    self: "${name} shows ${e.banana} to themselves\n<b>For:</b> ${duration}\n<i>respect the decision</i>"
    self_again: "${name} shows ${e.banana} to themselves again\n<b>For:</b> ${duration}\n<i>is this a tradition?</i>"
    self_legend: "${name} shows ${e.banana} to themselves\n<b>For:</b> ${duration}\n<i>self-moderation legend</i>"
    first_after_many: "Historic moment! ${name} gets their first ${e.banana}\n<b>For:</b> ${duration}"
    round_number: "${name} gets milestone ${e.banana} #${count}\n<b>For:</b> ${duration}"
    speed_ban: "${name} gets ${e.banana} speedrun\n<b>For:</b> ${duration}\n<i>that was fast</i>"
    minute_exact: "${name} gets ${e.banana} for exactly one minute\n<i>precision is key</i>"
kick:
  suc: ${name} gets kicked 👢
  who: Who to kick? 🤔
  error: "${e.cross} Can't kick"
  error_admin: "${e.cross} Can't kick admins"
  error_left: "${e.cross} Already left"
  error_no_rights: "${e.cross} Give me ban permissions"
  easter:
    self: "${name} kicked themselves 👢\n<i>respect</i>"
    admin_self: "Admin ${name} kicked themselves 👢\n<i>plot twist</i>"
del:
  error: "${e.cross} Can't delete"
  error_no_rights: "${e.cross} Give me delete permissions"
  error_old: "${e.cross} Message too old"
sticker:
  save:
    suc: Sticker added to <a href="${link}">group pack</a> ✓
    error:
      animated: Animated not supported 😅
      telegram: "${e.cross} Couldn't save"
  delete:
    suc: Sticker removed from <a href="${link}">pack</a> ✓
    error:
      telegram: "${e.cross} Couldn't delete"
  empty_forward: "↩️ Reply to a sticker, photo, or file"
  only_admin: "${e.lock} Admins only. Personal pack — @fStikBot"
spam:
  # Legacy notification keys removed in favour of the unified mod_event:*
  # namespace (see §9 of the UX design). Only the override toast is still
  # used from `handlers/spam-vote.js`.
  admin_override_not_admin: "Only group admins can do this"
  error:
    mute_failed: |
      ${e.cross} <b>Couldn't mute ${name}</b>
      Reason: ${reason}
    delete_failed: |
      ${e.cross} <b>Couldn't delete spam from ${name}</b>
      Reason: ${reason}
    partial_success_muted: |
      ${e.check} ${name} muted for spam
      Reason: ${reason}
      ${e.warn} Couldn't delete message
    partial_success_deleted: |
      ${e.check} Spam deleted
      ${e.warn} Couldn't mute ${name}
      Reason: ${reason}

only_group: "${e.group} Works in groups only"
only_admin: "${e.lock} Group admins only"

global_ban:
  # Legacy `kicked` key removed — notification now unified via
  # mod_event.compact.global_ban (§9 of the UX design).

