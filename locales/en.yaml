        • <code>!extra name</code> — save a quick command

        <b>How to give me admin rights:</b>
        Open chat settings → Administrators → Add admin → LyAdminBot, enable "Delete messages" and "Ban users".
      about: |
        <b>LyAdminBot</b> — anti-spam bot for Telegram groups.

        What I do:
        ${e.shield} catch spam (rules, signatures, AI, voting)
        ${e.banana} moderation: ban, kick, delete
        ${e.wave} welcome new members
        ${e.chart} activity stats
