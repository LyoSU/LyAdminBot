      start: |
        I catch spam in groups automatically — just add me and make me admin.

        <b>Quick start:</b>
        1. Add to group
        2. Give admin rights (delete messages + ban users)
        3. Type <code>/ping</code> in the group to verify

        Core commands:
        • <code>/help</code> — this menu
        • <code>/lang</code> — change language
        • <code>/ping</code> — is the bot alive
